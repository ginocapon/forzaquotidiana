<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="title desc">
<title id="title">Clean Halo passo 3  passaggio posteriore</title>
<desc id="desc">Figura originale La Forza Quotidiana: kettlebell dietro la nuca, core attivo, arco stretto.</desc>
<style>
  .bg{fill:#121212}.floor{fill:#1a1a1a;stroke:#2e2e2e;stroke-width:1}.line{stroke:#2a2a2a;stroke-width:1;fill:none}
  .wall{fill:#181818}.mirror{fill:#243038;stroke:#3a4a55;stroke-width:2}.rack{stroke:#333;stroke-width:3;fill:none;stroke-linecap:round}
  .skin{fill:#ddd4c8}.shirt{fill:#2f2f2f}.shorts{fill:#c9783a}.shoe{fill:#222}
  .muscle{fill:#c9783a;opacity:.85}.kb{fill:#3d3d3d;stroke:#555;stroke-width:1.5}.kb-hot{fill:#c9783a;opacity:.35}
  .core{fill:none;stroke:#c9783a;stroke-width:2;stroke-dasharray:4 4;opacity:.7}
  .arc{fill:none;stroke:#c9783a;stroke-width:2.5;stroke-dasharray:8 6;opacity:.75}
  .label{fill:#f2ece3;font:600 14px system-ui,sans-serif}.sublabel{fill:#999;font:400 11px system-ui,sans-serif}
  .badge{fill:rgba(201,120,58,.15);stroke:#c9783a;stroke-width:1}
</style>
<rect class="bg" width="480" height="360"/>
<rect class="wall" x="0" y="0" width="480" height="200"/>
<rect class="mirror" x="140" y="36" width="200" height="100" rx="4"/>
<path class="floor" d="M60 200 L420 200 L480 360 L0 360 Z"/>
<path class="line" d="M120 240 H360 M80 280 H400"/>
<path class="rack" d="M72 80 V200 M408 80 V200"/>
<!-- Atleta vista posteriore stilizzata -->
<ellipse class="skin" cx="240" cy="112" rx="20" ry="24"/>
<rect class="shirt" x="212" y="134" width="56" height="68" rx="10"/>
<path class="muscle" d="M220 140 Q240 152 260 140 L256 178 Q240 186 224 178 Z" opacity=".6"/>
<rect class="shorts" x="216" y="200" width="48" height="26" rx="6"/>
<rect class="shoe" x="220" y="256" width="18" height="10" rx="3"/>
<rect class="shoe" x="242" y="256" width="18" height="10" rx="3"/>
<path fill="none" stroke="#ddd4c8" stroke-width="12" stroke-linecap="round" d="M196 148 Q182 178 188 208"/>
<path fill="none" stroke="#ddd4c8" stroke-width="12" stroke-linecap="round" d="M284 148 Q298 178 292 208"/>
<!-- Core attivo -->
<ellipse class="core" cx="240" cy="168" rx="28" ry="22"/>
<!-- KB dietro nuca -->
<ellipse class="kb" cx="240" cy="98" rx="24" ry="28"/>
<ellipse class="kb-hot" cx="240" cy="98" rx="16" ry="20"/>
<path class="kb" d="M228 72 Q240 58 252 72" fill="none" stroke="#666" stroke-width="4" stroke-linecap="round"/>
<!-- Arco posteriore -->
<path class="arc" d="M268 92 A 48 48 0 0 0 212 92"/>
<rect class="badge" x="24" y="24" width="56" height="28" rx="14"/>
<text class="label" x="52" y="43" text-anchor="middle">3</text>
<text class="label" x="240" y="32" text-anchor="middle">Passaggio posteriore</text>
<text class="sublabel" x="240" y="50" text-anchor="middle">KB dietro la nuca · arco stretto · costole chiuse · 10 rep antiorario</text>
<text class="sublabel" x="240" y="340" text-anchor="middle">La Forza Quotidiana · figura originale SVG</text>
</svg>
