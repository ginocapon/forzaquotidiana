<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="title desc">
<title id="title">Clean Halo passo 1 — kettlebell al petto</title>
<desc id="desc">Figura originale La Forza Quotidiana: atleta in posizione goblet con kettlebell al centro del petto, palestra stilizzata.</desc>
<style>
