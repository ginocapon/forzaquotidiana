name: Trigger Pages rebuild

# Fallback: se Pages usa ancora "Deploy from branch", forza rebuild su ogni push.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  contents: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Request GitHub Pages build
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
          echo "Pages rebuild requested."
